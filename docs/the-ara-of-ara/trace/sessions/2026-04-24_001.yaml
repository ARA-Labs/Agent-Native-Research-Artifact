  - type: decision
    id: "harness-bash-mass-batch-hook"
    provenance: ai-executed
    summary: "Added PreToolUse Bash hook in harness.py that rejects mass-batch scoring patterns (`for i in {1..N>10}` calling score-related commands, nohup/&/while-true). Surfaces clear rejection reason to agent explaining the SLURM cgroup OOM/SIGTERM mechanic. 19/19 unit tests + E2E SDK test confirm rejection surfaces. Working: triton paper s8 + ara s8 each had hook fire once, then continued under N≤10."

  - type: decision
    id: "harness-per-task-score-timeouts"
    provenance: ai-executed
    summary: "Per-task score timeouts: triton 1200s mid / 1800s final (was 300s), rust 7200s/10800s. Default 300s killed triton ara s2 6848032 final-scoring before final_score.json could write."

  - type: decision
    id: "harness-pushback-ceiling-1000"
    provenance: ai-executed
    summary: "Bumped max_end_turn_pushbacks to 1000 (was 40). Pushback triggers expanded from end_turn-only to {end_turn, stop_sequence, max_tokens, pause_turn}. Prior config let agents go silent for 6+ hours after self-declaring 'session complete'."

  - type: dead-end
    id: "triton-cgroup-oom-class"
    provenance: ai-executed
    summary: "Multiple triton agents (paper 7831468, ara OLD 7831469, paper NEW 7850058, ara NEW 7853727) all died with exit code 143 (SIGTERM) or -9 (SIGKILL). Root cause: cumulative GPU memory + process count from `for i in {1..N}; do bash score.sh; done` mass-batches exceeded SLURM cgroup limits → cgroup OOM-handler killed claude CLI → SDK hung in receive_messages → SLURM eventually timed out at 8h. Fixed by bash hook (prevention) + 200G mem / 26 cpu sbatch (headroom)."

  - type: dead-end
    id: "harness-receive-messages-no-watchdog"
    provenance: ai-executed
    summary: "When SDK CLI subprocess dies mid-run, harness has no watchdog on client.receive_messages() — it just hangs forever waiting for messages. SLURM kills the whole job at 8h limit. No final_score.json written. Wasted 5-7h of SLURM time per failed run. Open thread: wrap receive_messages with asyncio.wait_for(timeout=N min) and proceed to final-scoring on timeout."

  - type: observation
    id: "rust-codecontests-benchmark-validity"
    provenance: ai-executed
    summary: "rust_codecontests has a benchmark-validity caveat: 165 problems are publicly-known CodeForces problems with public editorials accessible via WebSearch (which task allows). Dominant strategy that emerges is hand-coded SOLUTIONS dict (problem_name -> Rust algorithm) with public-test gating. ARA materials surface this as H12; paper-arm agent did not pivot to library approach in 6.5h+ and plateau'd at 39/165 (~2x baseline). The library strategy is NOT reward hacking (each entry is a real algorithm validated against private+generated tests) but exploits the publicness of the problem set."

  - type: observation
    id: "triton-kernel-expertise-ceiling"
    provenance: ai-executed
    summary: "Triton kernel optimization has a sharp expertise ceiling for sonnet-4-5/4-6. Paper plateaus at reference ~0.65; ara plateaus at one-trick-beyond-reference ~0.43-0.49; only the 7982791 ara s8 run found a deeper trick at 0.27. Most agents find easy first-order tricks (autotune sweeps, block sizing, num_warps) and exhaust their idea space; ARA helps reach the first-trick ceiling fast but cannot supply kernel-level expertise the model lacks."

