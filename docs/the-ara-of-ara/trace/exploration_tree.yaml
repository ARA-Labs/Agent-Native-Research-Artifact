      - id: N73
        type: dead_end
        title: "Large batch (batch_size=117) stalls: rate limiter sleep blocks asyncio.as_completed timeout"
        provenance: ai-executed
        timestamp: "2026-03-20T16:03"
        hypothesis: >
          Running all 117 validation problems in a single batch with
          max_time_per_batch=7200 would complete within 2 hours and produce
          an official score.
        failure_mode: >
          After 83/117 problems completed (2h12m), the remaining 34 problems
          were stuck in asyncio.sleep() inside the rate limiter's acquire() method.
          The asyncio.as_completed() timeout (7200s) fires only when the timeout
          elapses from the coroutine's perspective, but asyncio.sleep() internally
          occupies the event loop slot without yielding — so the timeout exception
          never propagated to the iterator. The process stayed alive but produced
          no output for 1h42m (last file modification at 14:20, killed at 16:03).
        lesson: >
          Rate limiter asyncio.sleep() inside a coroutine being awaited by
          as_completed() does not respect the as_completed timeout — the sleep
          is not an awaitable that propagates CancelledError in Python 3.12 without
          explicit task cancellation. Use smaller batch sizes so each batch
          completes well within the timeout.

      - id: N74
        type: dead_end
        title: "batch_size=10, max_time_per_batch=300 too tight: produces 2+ timeouts per batch"
        provenance: ai-executed
        timestamp: "2026-03-20T16:25"
        hypothesis: >
          Reducing to batch_size=10 with 300s per batch would give each
