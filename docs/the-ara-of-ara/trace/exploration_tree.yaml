  - id: N102
    type: dead_end
    title: "Rebench ARA hallucination: ingestor fabricated algorithm, wrong formula, invented experiments"
    provenance: ai-executed
    timestamp: "2026-04-14"
    hypothesis: >
      The ingestor skill, given the RE-Bench task README and MALT trace dead ends,
      would produce accurate ARA content for the triton_cumsum task.
    failure_mode: >
      Comprehensive audit of rebench-triton_cumsum ARA against official solution files
      revealed systematic hallucination: (1) Algorithm described as "Blelloch two-pass
      scan with v_even/v_odd monoid" — actual solution is a 3-kernel pipeline
      (prefix_odd_block_kernel → contitional_cumsum_kernel → add_block_sums) with atomic
      suffix propagation. (2) Score formula stated as log10 throughout — actual formula
      is ln (natural log). (3) experiments.md contained fabricated timing tables (numbers
      never measured). (4) BLOCK_SIZE described as 512-2048 — actual winner is 16384.
      (5) Success path nodes N17-N22 in exploration_tree.yaml describe a Blelloch approach
      that was never implemented — fabricated to construct a plausible story.
    lesson: >
      The ingestor hallucinates when given insufficient source material or when the
      source is ambiguous. Critical safeguard: for every claim, trace it to a specific
      line in a specific source file. Claims that cannot be traced are hallucinations.
      The rebench ARAs must be rebuilt from official solution zips + notes.md, which
      contain the real algorithm, real configs, and real scores.
    also_depends_on: [N04]

