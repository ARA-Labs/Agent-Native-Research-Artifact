      confound the ARA-vs-PDF signal.
    lesson: >
      Reuse existing rigorous benchmark infrastructure rather than building ground truth
      from scratch. If an existing benchmark provides rubrics, corpora, and baselines,
      adopt it even if it means giving up some control over paper selection. The custom
