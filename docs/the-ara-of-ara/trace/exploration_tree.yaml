  - id: N76
    type: experiment
    title: "ARA seed10 rust_codecontests: scorer's semaphore + backoff — solution_final 0.5818 test set"
    provenance: ai-executed
    timestamp: "2026-03-20T23:00"
    also_depends_on: [N113, N71]
    result: >
      Built solution_final.py for ARA seed10 (rust_codecontests) using the scorer's
      own asyncio.Semaphore (controlled by --max_workers=3) as the sole concurrency
      gate. The backoff library (expo, max_time=240, max_tries=5, full_jitter) handles
      429 retries transparently. Single candidate, 2 compile retries with full error
      feedback (H01), no test-fix loop. Run: batch_size=10, max_workers=3, max_time_per_batch=600.
      Validation (117 problems): 0.6154 (72/117). Test set (165 problems): 0.5818 (96/165, SE=0.038).
      Key insight: with max_workers=3, at most 3 concurrent API calls happen at any time — no
      custom rate limiter needed. This is 4.5x the reference (0.13).
    evidence: ["code/eval/extension/results/rust_codecontests_ara_seed10/solution_final.py"]
    children:

      - id: N77
        type: dead_end
        title: "Custom rate limiters (token bucket, module-level semaphore) fail under shared API key"
        provenance: ai-executed
        timestamp: "2026-03-20T22:00"
        hypothesis: >
          Building a custom token-bucket rate limiter (v3/v7) or module-level global
          asyncio.Semaphore (v4/v6) inside the solution module would control API call
          rates for a single experiment run.
        failure_mode: >
          Multiple experiments sharing the same Azure API key (baseline seed10, ARA seed8,
          ARA seed10) consume the ~10 req/min budget collectively. A custom limiter inside
          one solution cannot see the other processes' consumption. The limiter pre-throttles
          at a rate that's already exceeded by sibling processes, causing 429s regardless.
          v3: asyncio.sleep(7.5s between calls) still got 429s from competing processes.
          v4: module-level Semaphore(3) created separate semaphore per module import — no sharing.
          v6: sequential candidates (2 per problem) × 20 concurrent problems = 40 serialized
          calls that overflowed the shared key's budget.
        lesson: >
          The only effective rate-limiting strategy when sharing an API key across
          processes is: (1) accept 429s as expected and use backoff retry, or (2) use
          the scorer's semaphore (max_workers flag) which controls concurrency for this
          process only, trusting that sibling processes are similarly constrained. Pre-throttling
          without global coordination is fundamentally broken in a multi-process environment.

