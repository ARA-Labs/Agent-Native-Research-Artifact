          × 7.5s = 900s is over, but average is much lower).
        failure_mode: >
          With max_workers=2 and batch_size=10, two problems can start
          simultaneously. Their API calls compete, and the rate limiter serializes
          them. When a problem requires many retries (compile failures + bad output),
          the 300s window runs out before it can attempt all candidates.
          Two "timed out" messages appeared in the first batch alone.
        lesson: >
