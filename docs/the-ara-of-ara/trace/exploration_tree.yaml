  - id: N94
    type: dead_end
    title: "Brainstorm: ExpBench as the Layer 2 reproduction cost benchmark"
    provenance: user
    timestamp: "2026-03-12"
    also_depends_on: [N24]
    hypothesis: >
      Use EXP-Bench (Kon et al. 2025) as the primary benchmark for Experiment 1
      ("Reproduction Cost via ExpBench") in the 5-experiment framework (N24).
      EXP-Bench measures end-to-end agent success on real experiment tasks;
      the plan was to show ARA improves end-to-end success rates compared to
      PDF-only agents, quantifying the "reproduction cost" reduction directly.
    failure_mode: >
      EXP-Bench's baseline is 0.5% end-to-end success (agents fail almost always).
      At that floor, any comparison between ARA and PDF is statistically meaningless —
      both conditions score ~0% and the "improvement" is noise. Binary end-to-end
      success also cannot show WHERE agents fail (is it environment setup? config
      recovery? algorithmic misunderstanding?) — exactly the decomposition needed
      to attribute improvement to ARA's specific layers. PaperBench's rubric-level
      scoring provides the fine-grained signal EXP-Bench lacks.
    lesson: >
      Choose benchmarks that are sensitive in the regime you're testing. A benchmark
      with near-zero baseline success is a ceiling test, not a comparison. Rubric-level
      decomposition (per-requirement success/partial/fail) reveals mechanism; binary
      end-to-end success conceals it. EXP-Bench is better cited as motivation
      (confirming agents fail on real tasks) than as an experimental platform.
    evidence: >
