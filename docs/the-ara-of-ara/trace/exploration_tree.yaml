  - id: N106
    type: dead_end
    title: "Phase 3 merge attempted via pyyaml dump — failed on cluster Python"
    provenance: ai-executed
    timestamp: "2026-04-14"
    hypothesis: >
      yaml.safe_dump with sort_keys=False would preserve the two-stream tree structure
      during the per-run → merged trace_nodes.yaml consolidation.
    failure_mode: >
      Cluster py3.6 pyyaml is < 5.1 and rejects the sort_keys kwarg; py3.11/3.12 do not
      have pyyaml installed and pip is not available. First merge attempt wrote only the
      tree head before the dump() call crashed, truncating the file to 172 lines with no
      malt_stream section.
    lesson: >
      On this cluster, avoid round-tripping large YAML through pyyaml. Switch to raw text
      concatenation from per-run source files to preserve formatting and sidestep
      serializer availability. For any multi-step file build, verify final line count
      against an expected minimum before declaring success.

