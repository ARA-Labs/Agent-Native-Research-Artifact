  - id: N95
    type: experiment
    title: "Deep dive: ARA as a ready-to-use RL training environment (task + reward)"
    provenance: user
    timestamp: "2026-04-08"
    also_depends_on: [N04, N89]
    exploration: >
      Developed an extended framing of ARA's Physical Layer as a structured RL
      training environment. Every ARA contains exactly what RL requires: a task
      (logic/experiments.md specifies what to verify), a reward (verifiable outcomes
      from evidence/ + preference signals from every accept, reject, and revision
      logged in the trajectory), and a policy initialization point (src/ kernel).
      Explored how this positions ARA as training data for research agents:
      the trace layer encodes human taste (every decision about what to pursue,
      refine, or discard) as structured signal, making the trajectory a learnable
      record of scientific judgment. Extended discussion: ARA artifacts aggregate
      into a training corpus where the signal is not "what did the agent do?"
      but "what did the human-agent team consider valuable?" — a sparse, high-quality
      reward signal distinct from RLHF's preference annotations.
    outcome: >
      The RL environment framing was kept in the paper as a paragraph in the
      Physical Layer description (protocol.tex): "Each artifact thus contains
      exactly what reinforcement learning requires: a task (/logic/experiments.md)
      and a reward (verifiable outcomes from /evidence plus preference signals from
      every accept, reject, and revision logged in the trajectory), making every
      ARA a ready-to-use training environment for research agents."
      The taste signal framing was added to the Storytelling Tax paragraph:
      "the trajectory renders human taste, the scarce resource that becomes the
      binding constraint once agents shoulder the grunt work, as structured signal."
      git commit 8eda63fa (2026-04-08).
    lesson: >
      The RL framing reframes ARA's value proposition beyond "better documentation"
      to "training infrastructure" — a much stronger position for an ML venue.
      It also explains why the trace layer is valuable even when agents don't
      consume it directly: it generates training signal as a side-effect of research.
      Keep this framing prominent in future versions; it speaks directly to the
      NeurIPS audience's primary interest.

  - id: N96
    type: experiment
    title: "Deep dive: 'Discussion and Limitations' restructured to forward-looking 'Future Work'"
    provenance: user
    timestamp: "2026-04-04"
    also_depends_on: [N04, N06, N30]
    exploration: >
      Spent a significant session reconsidering the Discussion section's purpose.
      The original "Discussion and Limitations" (five numbered limitations + four
      analytical paragraphs) was defensive in tone — it spent most of its space
      on what ARA cannot do. The limitations addressed: Ingestor fidelity bounded
      by LLM capabilities; evaluation scale (30 papers insufficient for robustness
      claims); adoption requiring tooling investment; domain scope limited to CS;
      and the "Semantic Traversal Tax" (hierarchical traversal overhead).
      Deep exploration of whether each limitation was structural (cannot be fixed
      without changing the protocol) or incidental (will be addressed by better
      tooling/scale). Also explored: should we argue "ARA is ready now" or
      "here is the roadmap"? Does NeurIPS expect limitations or future directions?
    outcome: >
      Restructured entirely as "Future Work" with three temporal horizons:
      near-term (lineage and self-maintaining ecosystems), medium-term (knowledge
      graph, collaborative discovery, continuous review), long-term (cross-disciplinary
      collective memory). The "Semantic Traversal Tax" limitation was CUT because
      the token data contradicted it (ARA uses FEWER tokens at Cat A: 86.3K vs 97.7K).
      The other limitations were moved to a standalone "Limitations" section.
      The forward-looking frame is stronger for NeurIPS: it argues ARA is a
      foundation for a new research ecosystem, not just a marginally better format.
      git commit 2ed9f228 (2026-04-04).
    lesson: >
      Limitations sections are necessary but should not be the Discussion's dominant
      mode. Lead with the vision; acknowledge constraints in a bounded section.
      Any limitation that is contradicted by your own data should be cut immediately.
      The "Semantic Traversal Tax" is a cautionary example: always check the data
      before claiming a cost exists.

  - id: N97
    type: dead_end
    title: "Brainstorm: 'Semantic Traversal Tax' as a named limitation of ARA"
    provenance: ai-suggested
    timestamp: "2026-03-15"
    also_depends_on: [N02, N39]
    hypothesis: >
      ARA introduces a structural overhead: agents must traverse a hierarchical
      file system (PAPER.md → layer directories → individual files) rather than
      reading a single linear document. This overhead — called the "Semantic
      Traversal Tax" — would show up as higher token usage per question and slower
      time-to-answer for simple queries. The limitation was drafted as a full
      paragraph in the Discussion section with a quantitative mitigation argument.
    failure_mode: >
      The token data directly contradicted this hypothesis. Cat A (fidelity questions,
      simplest category) showed ARA agents use FEWER tokens per question than PDF
      agents: 86.3K vs 97.7K on PaperBench (12% fewer), and 84.6K vs 88.5K overall.
      PAPER.md's layer index transforms each query from a linear document scan into
      a targeted file lookup — progressive disclosure is more efficient, not less.
      The "Semantic Traversal Tax" paragraph was cut from the Discussion in
      commit 2ed9f228 (2026-04-04) when the data made it indefensible.
    lesson: >
      Never name a cost before measuring it. The intuitive overhead of "more files
      to navigate" turned out to be offset by indexed navigation being faster than
      linear scanning. The token efficiency finding is now framed as a positive
      result (ARA is not just more accurate but also more efficient) rather than
      as a mitigated limitation. If you hypothesize a cost, run the numbers first.

