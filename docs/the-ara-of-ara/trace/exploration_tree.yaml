  - id: N89
    type: pivot
    title: "3-layer architecture → 4-layer: Evidence separated from Exploration Graph"
    provenance: user
    timestamp: "2026-03-12"
    also_depends_on: [N04]
    prior_direction: >
      N04 established three orthogonal layers: Cognitive (/logic), Physical (/src),
      and Exploration Graph (/trace). Evidence (raw numbers, tables, logs) was
      considered part of the Exploration Graph layer or implicitly part of /logic
      via claim proof pointers. The four-layer option was listed as an alternative
      and explicitly not chosen in N04.
    new_direction: >
      Added Evidence as an independent 4th layer (/evidence) separate from /trace.
      The Exploration Graph retains the decision history and dead ends; /evidence
      holds raw empirical outputs (metric tables, training curves, evaluation logs).
    reason: >
      Access control: a verification agent should be able to receive the code kernel
      and algorithm descriptions while /evidence is withheld, preventing fabrication
      by copying expected values. This separation also makes experiments.md (in /logic)
      meaningful: it specifies what to verify without revealing what to expect.
      Conflating evidence with the exploration graph means every agent reading the
      trace layer also sees the ground-truth numbers — collapsing the blind-reproduction
      guarantee that is one of ARA's core design properties.
      The separation also matches the agent's four fundamental needs: understand (/logic),
      reproduce (/src), learn from process (/trace), verify claims (/evidence).
    lesson: >
      Access control is a first-class design constraint, not an afterthought. Any time
      a layer contains information that should be selectively withheld, it must be its
      own layer. The 3-layer design implicitly assumed a single access level; 4 layers
      allow fine-grained grants (logic+src for reproduction agents, +evidence for
      verification agents, +trace for extension agents).
    evidence: >
      paper/sections/protocol.tex §3.2 — four-layer architecture description;
      paper/sections/protocol.tex — experiments.md design note on layered access control;
      N04 (original 3-layer decision, four-layer listed as rejected alternative)

  - id: N90
    type: decision
    title: "Difficulty-weighted scoring (easy×1, medium×2, hard×3) for reproduction eval"
    provenance: user
    timestamp: "2026-03-17"
    also_depends_on: [N33]
    choice: >
      Weight reproduction subtasks by difficulty (easy×1, medium×2, hard×3) rather
      than flat averaging. 150 subtasks across 15 papers are stratified into 50 easy,
      49 medium, 51 hard based on rubric complexity and implementation requirements.
    alternatives:
      - "Flat average: all subtasks weighted equally"
      - "Binary pass/fail per paper (did ARA complete all 10 subtasks?)"
      - "Token-efficiency-weighted: penalize solutions that consume more tokens"
    evidence: >
      Flat average creates a cherry-picking incentive: an agent can score 50% by
      completing all easy subtasks and skipping hard ones. Difficulty weighting
      forces the agent to engage with configuration-critical and multi-step subtasks
      where ARA's structured layers provide the most leverage. The per-difficulty
      breakdown (easy +4.9pp, medium +5.6pp, hard +8.5pp) confirms ARA's advantage
      concentrates exactly where the weight is highest — this finding would be invisible
      under flat averaging. git commit a4e95416 (2026-03-17).

  - id: N91
    type: decision
    title: "RE-Bench dead-end nodes sourced from real MALT traces, not domain expertise"
    provenance: user
    timestamp: "2026-03-16"
    also_depends_on: [N15, N30]
    choice: >
      Mine dead-end nodes for all 7 RE-Bench ARA artifacts from the METR MALT
      transcripts dataset (2,332 real agent runs, 46,303 failure episodes) rather
      than constructing them from domain expertise. Filter to research-level failures,
      deduplicate, cluster into 70 canonical dead-end nodes, each recording a
      structured (hypothesis, failure_mode, lesson) triple.
    alternatives:
      - "Handcraft dead ends from domain expertise (manually enumerate known pitfalls)"
      - "Use only the dead ends already in the RE-Bench starter code comments"
      - "Ask domain experts to annotate failure modes post-hoc"
    evidence: >
      Handcrafted dead ends introduce researcher selection bias: we would document
      the failures we expect, not the failures agents actually encounter. Real MALT
      traces capture what frontier models (21 models, 24,008 runs) actually tried
      and failed at — a ground-truth distribution of agent failure modes. This also
      makes the dead-end nodes directly actionable for the agent consuming the ARA:
      they describe real runs it is likely to attempt, not hypotheticals.
      Empirical grounding also strengthens C06 (negative knowledge value claim):
      the dead ends are not cherry-picked to make ARA look good, they are the
      most frequent failure clusters in a large unbiased sample.
      git commit 3f692463 (2026-03-16) — extension experiment design with MALT sourcing.

  - id: N92
    type: dead_end
    title: "Brainstorm: 'Forensic completeness' as a measurable Ingestor eval metric"
    provenance: ai-suggested
    timestamp: "2026-03-14"
    also_depends_on: [N10, N39]
    hypothesis: >
      Define "forensic completeness" — the fraction of tacit knowledge in a paper
      that the Ingestor successfully recovers — as a first-class evaluation metric.
      Operationalize it by asking domain experts to enumerate all tacit knowledge
      in a paper (convergence tricks, unreported dead ends, implementation heuristics)
      and measuring what fraction of that list appears in the ARA.
      Include this metric in the evaluation section alongside fidelity and configuration
      recovery. A complete Discussion paragraph was drafted explaining the concept
      with the Transformer paper as a worked example: the Ingestor recovers
      explicitly stated heuristics (lr warmup 4,000 steps, label smoothing 0.1,
      sqrt(d_k) scaling) but misses code-only details (weight init, dropout placement).
    failure_mode: >
      No ground truth is possible. "Tacit knowledge" is precisely the information
      that was never written down — it is impossible to enumerate what the PDF omits
      without access to the original authors and their lab notebooks. Any attempt
      to measure forensic completeness would itself require tacit knowledge from the
      domain expert to construct the gold reference, making the metric circular.
      The Discussion paragraph was cut from the paper (git commit 2ed9f228, 2026-04-04)
      when the Discussion was restructured from "Discussion and Limitations" to "Future Work."
    lesson: >
      The right measure of Ingestor quality is downstream agent utility (understanding/
      reproduction/extension), not source-document recovery rate. Downstream utility
      is objectively measurable with rubrics and scoring functions; source recovery
      is philosophically ill-defined. When a metric cannot be operationalized without
      assuming its own answer, drop it. The Transformer example can appear qualitatively
      in an appendix as illustration, not as a scored claim.
    evidence: >
      git commit 2ed9f228 diff — removed ~40-line "Forensic completeness" Discussion
      paragraph; ara/trace/sessions/ — never crystallized into a claim or experiment

