  - id: N88
    type: pivot
    title: "Custom 20-paper canonical corpus → PaperBench 23 papers exclusively"
    provenance: user
    timestamp: "2026-03-12"
    also_depends_on: [N08, N11]
    prior_direction: >
      N08 established a curated 20-paper corpus of canonical AI papers (Transformer,
      GPT-2, DPO, etc.) spanning 13 subfields and 2014-2023. These were chosen for
      diversity and recognizability. The plan was to build ARA artifacts for all 20
      and use them as the primary evaluation corpus.
    new_direction: >
      Replaced the custom corpus entirely with PaperBench's 23 papers as the
      eval set. Extended to 7 RE-Bench tasks as the second benchmark.
    reason: >
