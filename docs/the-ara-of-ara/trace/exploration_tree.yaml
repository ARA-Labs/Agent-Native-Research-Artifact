      - id: N116
        type: dead_end
        title: "subprocess.run(shell=True) orphans GPU processes indefinitely"
        provenance: ai-executed
        timestamp: "2026-03-17T15:00"
        hypothesis: >
          Python's subprocess.run with shell=True and timeout would cleanly kill
          all spawned processes when a bash command times out.
        failure_mode: >
          subprocess.run only kills the shell process, not its children. GPU training
          scripts (python3 subtask8_dpo_training.py etc.) become orphans (ppid=1) and
          hold GPU memory indefinitely. Observed 5 orphaned processes consuming 30.5GB
          across ARA and baseline runs, persisting for 2-7 hours after the agent moved on.
          This caused: (1) OOM for subsequent GPU scripts, (2) baseline probe used 32K
          samples instead of 560K due to memory pressure, (3) accuracy dropped from 93% to 80%.
        lesson: >
          Agent scaffolds running GPU workloads MUST use process groups (start_new_session=True)
          and kill the entire group (os.killpg) on timeout. Additionally, an exit-time cleanup
          that finds GPU processes by cwd matching the output directory is essential as a safety net.

