  - id: O07
    timestamp: "2026-03-12T11:00"
    provenance: ai-suggested
    content: "pinn is an extreme outlier at 94.2% sufficient (next best: 74.2%). Its rubric is 92.5% Code Execution with highly specific 'run this config' checks. The paper is a systematic empirical study where the contribution IS the experimental grid — narrative purpose perfectly aligns with reproduction needs. This is the rare case, not the norm."
    context: "Full 23-paper info gap analysis"
    potential_type: claim
    promoted: false

  - id: O08
    timestamp: "2026-03-12T11:00"
    provenance: ai-suggested
    content: "Negative correlation (-0.76) between rubric size (n_requirements) and pct_sufficient. Larger, more granular rubrics expose more gaps. This suggests the gap is even larger than our numbers show — coarser rubrics mask missing detail."
    context: "Full 23-paper info gap analysis"
    potential_type: claim
    promoted: false

  - id: O09
    timestamp: "2026-03-12T11:00"
    provenance: ai-suggested
    content: "Dataset and Model Acquisition is 5.4% sufficient across ALL papers (25.5% entirely absent). This is the single worst fine-grained category. No paper consistently provides download URLs for pretrained models or datasets. This is a universal structural failure of the PDF format."
    context: "Full 23-paper info gap analysis"
    potential_type: claim
    promoted: false

  - id: O10
    timestamp: "2026-03-12T11:00"
    provenance: ai-suggested
    content: "The existing RIC evaluation (Exp B) scored PDF at 98.2% — wildly overestimating coverage because it treated any mention as 'found'. The strict evaluation (sufficient/partial/absent) reveals the true gap: 45% sufficient. The difference highlights that leniency in evaluation design can mask the information gap entirely."
    context: "Comparing old vs new evaluation methodology"
    potential_type: heuristic
    promoted: false

  - id: O11
    timestamp: "2026-03-12T17:30"
    provenance: ai-executed
    content: "RE-Bench shows extreme score variance within same (task, model): Claude 4 Opus on fix_embedding scores [0.00, 0.70, 0.97, 1.00]. Even Claude Opus 4.6 on scaling_law: [0.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00]. Identical agent, identical task, lottery-like outcomes. This directly supports ARA Exploration Graph: if run #1's graph were shared, run #2 wouldn't need to rediscover dead ends."
    context: "METR eval-analysis-public RE-Bench analysis"
    potential_type: claim
    promoted: false

  - id: O12
    timestamp: "2026-03-12T17:30"
    provenance: ai-executed
    content: "Model progression on RE-Bench: GPT-4 (2023-03) avg=0.037 → o1-preview (2024-09) avg=0.072 → Claude 3.7 Sonnet (2025-02) avg=0.442 → Claude Opus 4.6 (2025-12) avg=0.974. 26x improvement in 2.5 years, but even the best model has individual runs that fail completely. Capability is necessary but insufficient — structured knowledge transfer is the missing piece."
    context: "METR eval-analysis-public model comparison"
    potential_type: claim
    promoted: false

  - id: O13
    timestamp: "2026-03-12T17:30"
    provenance: ai-executed
    content: "Difficulty cliff is dramatic and consistent: agent success drops from 89.8% (easy, <1h human) to 49.9% (1-2h) to 12.1% (2-4h) to 7.8% (>16h). The cliff is at ~2h human time — exactly where RE-Bench showed agents plateau. Above this threshold, 96-98% of compute cost is wasted on failed exploration."
    context: "METR eval-analysis-public difficulty analysis"
    potential_type: claim
    promoted: false

  - id: O14
    timestamp: "2026-03-12T17:30"
    provenance: ai-suggested
    content: "AIDE's tree search scaffold outperforms Modular's linear context on RE-Bench because it maintains implicit exploration structure (each solution is a node, patches spawn children). But this tree is agent-internal and not in the trace. ARA externalizes this — making exploration structure inspectable, portable, and auditable. AIDE already proved structure helps; ARA makes it a first-class artifact."
    context: "RE-Bench scaffold comparison analysis"
    potential_type: claim
    promoted: false

  - id: O15
    timestamp: "2026-03-12T17:30"
    provenance: ai-executed
    content: "16.6% of (task, model) pairs show 'mixed outcomes' — same model on same task sometimes succeeds, sometimes fails, with median 50% success rate (coin flip). These 750 pairs account for 3,891 runs. This lottery effect is the direct cost of non-deterministic exploration without knowledge sharing."
    context: "METR eval-analysis-public outcome variance analysis"
    potential_type: claim
    promoted: false

  - id: O16
    timestamp: "2026-03-12T22:00"
    provenance: ai-suggested
    content: "RIC evaluation on test-time-model-adaptation shows PDF (0.982) outperforming ARA (0.942). The gap is Ingestor fidelity, not format limitation — ARA schema CAN represent all info, but current Ingestor doesn't always extract exhaustively. 17 partial matches concentrate in Code Development where appendix-level detail is summarized. This is an Ingestor improvement opportunity, not a format problem."
    context: "Populating new evaluation section with existing RIC data"
    potential_type: heuristic
    promoted: false

  - id: O17
    timestamp: "2026-03-12T22:00"
    provenance: ai-suggested
    content: "Old evaluation section had 302 lines of meticulously structured prose — all with TODO placeholders for every single number. New section is 260 lines with ~60% of data points populated from existing results. The pivot from speculative framework to data-grounded experiments is a significant quality improvement."
    context: "Evaluation rewrite"
    potential_type: unknown
    promoted: false

  - id: O18
    timestamp: "2026-03-13T01:00"
    provenance: ai-executed
    content: "22 of 23 PaperBench papers lack ARA artifacts — only test-time-model-adaptation has one. This is the critical blocker for the full Understanding evaluation (Cat A needs ARAs for all 31 papers, Cat B needs ARAs for 23 PaperBench papers). Estimated ~$100 and ~45 min to generate all 22 missing ARAs via the Universal Ingestor."
    context: "Artifact inventory during experiment planning"
    potential_type: decision
    promoted: false

  - id: O19
    timestamp: "2026-03-13T01:00"
    provenance: ai-suggested
    content: "Category B question generation from PaperBench rubrics is a novel methodological contribution: by selecting requirements rated 'partial' or 'absent' in the info gap analysis, we create questions that are DESIGNED to favor ARA — but fairly, because the gold_answer comes from ground truth (the rubric), not from ARA itself. This is an intentionally adversarial setup for the PDF baseline."
    context: "Designing Category B question protocol"
    potential_type: heuristic
    promoted: false

  - id: O20
    timestamp: "2026-03-13T01:00"
    provenance: ai-suggested
    content: "For RE-Bench/Speedrun baseline agent, the 'PDF' is actually a task description README + starter code, NOT a research paper PDF. This is a conceptually different baseline than PaperBench and should be acknowledged in the paper. The framing 'PDF+GitHub' doesn't quite apply to RE-Bench — it's more 'task spec + code'."
    context: "Designing baseline protocol for RE-Bench Category C evaluation"
    potential_type: heuristic
    promoted: false

  - id: O21
    timestamp: "2026-03-13T18:00"
    provenance: ai-executed
    content: "ARA hallucination rate is 19.4% vs PDF 3.0% across all 465 questions. The structured format appears to encourage overconfident inference — ARA agents attempt answers where PDF agents conservatively abstain. This is partly a scoring artifact (attempting an answer risks hallucination penalty; abstaining avoids it) but also a genuine Ingestor calibration issue. Future Ingestor should mark inferred vs explicit information."
    context: "Understanding evaluation hallucination analysis"
    potential_type: heuristic
    promoted: false

  - id: O22
    timestamp: "2026-03-13T18:00"
    provenance: ai-executed
    content: "Difficulty reversal: ARA loses on T2 (scattered) questions 25-56 but wins on T3 (implicit) questions 72-54. T1 (explicit) is exactly tied 22-22. The Ingestor's restructuring hurts verbatim retrieval (T2 requires assembling scattered info) but helps inference (T3 benefits from organized structure). This creates a natural trade-off: the more structured the representation, the better it is for reasoning but worse for verbatim recall."
    context: "Understanding evaluation difficulty breakdown"
    potential_type: claim
    promoted: false

  - id: O23
    timestamp: "2026-03-13T18:00"
    provenance: ai-executed
    content: "Category B (detail recovery) shows near-parity (ARA 20.9% vs PDF 19.1%, 60% ties). Despite targeting rubric gaps where PDFs are known to be deficient, the Ingestor doesn't add new information — it restructures what the PDF contains. The configs/ layer consolidates scattered hyperparameters but can't invent missing ones. This confirms the Ingestor is a reformatter, not an information augmenter."
    context: "Understanding evaluation Cat B analysis"
    potential_type: claim
    promoted: false

  - id: O24
    timestamp: "2026-03-13T18:00"
    provenance: ai-executed
    content: "RE-Bench Cat A shows PDF winning 40 vs ARA 13 — much worse than PaperBench Cat A (PDF 72 vs ARA 49). The RE-Bench ARAs were generated from task descriptions not PDFs, and the baseline reads the same task descriptions. The Ingestor adds structure but may lose verbatim details in the conversion. For RE-Bench, the ARA is a restructured version of what the baseline reads directly."
    context: "Understanding evaluation per-benchmark analysis"
    potential_type: heuristic
    promoted: false

  - id: O25
    timestamp: "2026-03-13T19:30"
    provenance: ai-executed
    content: "Absolute correctness scoring reveals PDF near ceiling on Cat A (97.1% success) vs ARA 80.6%. The old relative scoring (37.1% PDF wins, 41.6% ties) masked the severity — most 'ties' were cases where both answered correctly. Absolute scoring is more informative: it shows the true success rate gap rather than obscuring it behind relative comparisons where both formats often succeed."
    context: "Understanding evaluation methodology change — relative to absolute"
    potential_type: heuristic
    promoted: false

  - id: O26
    timestamp: "2026-03-13T19:30"
    provenance: ai-executed
    content: "The difficulty reversal persists under absolute scoring and is now more precisely quantified: T2 (scattered) ARA 66.7% vs PDF 86.8% (-20.1pp), T3 (implicit) ARA 68.0% vs PDF 57.8% (+10.2pp). The reversal is asymmetric — ARA loses more on scattered than it gains on implicit. This explains the overall Cat A gap: there are more T2 questions (159) than T3 (206) in terms of impact."
    context: "Difficulty breakdown under absolute scoring"
    potential_type: claim
    promoted: false
    stale: true

  - id: O27
    timestamp: "2026-03-13T22:30"
    provenance: ai-executed
    content: "Rubric supplementation dramatically improves ARA quality for understanding eval. Papers re-ingested with rubrics showed massive score improvements: sample-specific-masks 2/15 → 12/15, sapg 5/15 → 13/15, self-composing-policies 1/15 → 14/15. The rubric provides structured reproduction requirements that the Ingestor uses to generate more complete artifacts. This validates the apple-to-apple comparison design: ARA should contain everything the baseline has, just restructured."
    context: "Understanding eval re-run after rubric-supplemented re-ingestion"
    potential_type: claim
    promoted: false

  - id: O28
    timestamp: "2026-03-13T22:30"
    provenance: ai-executed
    content: "Cat B ARA advantage (54.8% vs 46.1%, +8.7pp) contradicts earlier parity observation (O23). The improvement comes from rubric-supplemented ARAs: the Ingestor now extracts more hyperparameters and configuration details when given explicit rubric requirements as guidance. This means the Ingestor IS an information augmenter when given richer input, not just a reformatter."
    context: "Understanding eval Cat B results after rubric re-ingestion"
    potential_type: claim
    promoted: false

  - id: O29
    timestamp: "2026-03-13T22:30"
    provenance: ai-executed
    content: "Dual-source question generation eliminated the Cat A gap almost entirely: old single-source (PDF-only) questions produced ARA 80.6% vs PDF 97.1% (-16.5pp); new dual-source questions produce ARA 83.5% vs PDF 82.9% (+0.6pp). The old gap was largely an artifact of question bias, not true information loss. This is a methodological insight: evaluation design matters as much as the system being evaluated."
    context: "Comparing old vs new Cat A results"
    potential_type: heuristic
    promoted: false

  - id: O30
    timestamp: "2026-03-14T22:00"
    provenance: ai-suggested
    content: "Speedrun Cat C (n=5) is too small for stable LLM judge evaluation. Across 3 runs: PDF scored 80% (4/5), then 60% (3/5), then 100% (5/5). Single question judge flips cause 20pp swings. RE-Bench Cat C (n=35) is the reliable signal. Future eval design should either increase Speedrun sample size or note instability."
    context: "Understanding eval re-run after ARA trimming — speedrun judgment inconsistency"
    potential_type: heuristic
    promoted: false

  - id: O31
    timestamp: "2026-03-14T22:00"
    provenance: ai-suggested
    content: "The enrichment-trimming cycle reveals a fundamental tension in ARA design: richer Physical Layer content improves implementation comprehension (Cat A +10pp on RE-Bench) but dilutes Exploration Graph retrieval (Cat C -22.5pp). This maps to the paper's dual-mode discussion: Kernel mode minimizes code footprint to prioritize Cognitive/Trace layers; Repository mode maximizes code detail. For eval artifacts, the 'minimal kernel' (notes.md + configs) appears to be the right balance."
    context: "Post-trimming eval results analysis"
    potential_type: claim
    promoted: false

  - id: O32
    timestamp: "2026-03-15T06:00"
    provenance: ai-suggested
    content: "ARA over-assertion pattern: in 2/10 PDF-win cases (pinn B01, B04), the ARA agent confidently stated ambiguous details 'as fact' from artifact configs when the gold answer says it is unconfirmed/implied. The structured format gives agents false confidence — they treat any information present in the artifact as explicitly stated by the paper, even when the ingestor inferred it. Future ingestor should mark inferred vs explicit information."
    context: "Question-level analysis of new ingestor Understanding eval"
    potential_type: heuristic
    promoted: false

  - id: O33
    timestamp: "2026-03-15T06:00"
    provenance: ai-suggested
    content: "PDF agent's dominant failure mode on Cat B is 'the paper does not provide this information' for details that ARE in the paper but buried in appendices or implementation details. 7 of 9 ARA wins are Cat B questions where the PDF agent couldn't locate the detail. ARA's structured format makes these findable. This is the core Cat B value proposition."
    context: "Question-level analysis of new ingestor Understanding eval"
    potential_type: claim
    promoted: false

  - id: O34
    timestamp: "2026-03-15T11:00"
    provenance: ai-suggested
    content: "Rubric sizes: adaptive-pruning 123 leaves (884 lines, 57KB), bam 789 leaves (5546 lines, 405KB), lbcs 916 leaves (6441 lines, 559KB). The large bam/lbcs sizes reflect massive Code Execution sections with per-run hyperparameter configurations. An eval agent reading these in full may consume significant context. Consider: (a) pagination/grep-based navigation, (b) summary header with R-number index at top, (c) separate index file. adaptive-pruning at 123 reqs is manageable; bam/lbcs need a navigation strategy."
    context: "Created rubric/requirements.md for 3 eval papers via sub-agent — confirmed counts"
    potential_type: heuristic
    promoted: false

  - id: O35
    timestamp: "2026-03-15T10:30"
    provenance: ai-executed
    content: "Latent ingestor bug discovered: run_ingest.py CLI had --repo argument and passed repo_path=args.repo to ingest(), but ingest() function signature only had rubric_path — no repo_path parameter. GitHub repo support was scaffolded in the CLI but never wired through to the agent. The bug was silent (Python **kwargs mismatch raises TypeError at call time). Fixed by adding repo_path to ingest() signature."
    context: "Implementing ingestor repo tool changes"
    potential_type: unknown
    promoted: false

  - id: O36
    timestamp: "2026-03-16T00:00"
    provenance: ai-suggested
    content: "rust_codecontests is inherently confounded for extension eval: the ARA trace was built from gpt-3.5-turbo experiments but the current environment uses gpt-5-mini (reasoning model with different API constraints). Implementation-level heuristics (temperature, n-parameter, token limits) don't transfer across model families. triton_cumsum is a cleaner comparison — GPU kernel optimization with no external LLM dependency."
    context: "Extension experiment early signal — analyzing ARA vs baseline results"
    potential_type: decision
    promoted: false

  - id: O37
    timestamp: "2026-03-16T00:00"
    provenance: ai-suggested
    content: "ARA agent on rust_codecontests spends 4-6 early turns reading PAPER.md, exploration_tree.yaml, heuristics.md, architecture.md before writing any code. Baseline agent starts coding by turn 3-4. This 'cognitive load' overhead may explain part of the ARA performance gap (0.50 vs 0.80) — the agent burns budget on trace navigation instead of solution iteration. At 1M token budget, this is ~15-20% of effective budget lost to reconnaissance."
    context: "Extension experiment — comparing turn usage patterns between conditions"
    potential_type: claim
    promoted: false

  - id: O38
    timestamp: "2026-03-16T00:00"
    provenance: ai-suggested
    content: "Baseline achieved identical 0.80 on both seeds despite different solution approaches (v3 vs v4 across seeds). ARA seed 2 (with temperature fix) achieved 0.50 with best score at v2 (turn 29), then regressed to 0.4 on v3. Score trajectories suggest baseline converges more reliably while ARA's trace-informed over-engineering produces more complex but less reliable solutions."
    context: "Extension experiment — score trajectory analysis"
    potential_type: claim
    promoted: false

  - id: O39
    timestamp: "2026-03-17T02:00"
    provenance: ai-suggested
    content: "ARA agent made better tactical decisions than baseline: when Julia/diffeqtorch failed, ARA agent quickly pivoted to scipy fallback (guided by structured environment.md listing alternatives). Baseline agent spent 20+ turns persisting with Julia without recognizing the dead end. The structured artifact's heuristics layer may be enabling faster dead-end recognition."
    context: "Pilot reproduction comparison — sequential-neural-score-estimation"
    potential_type: claim
    promoted: false

  - id: O40
    timestamp: "2026-03-17T02:30"
    provenance: ai-executed
    content: "Implementation tasks (T02-T07) scored 100% under ARA — the structured artifact's algorithm pseudocode, architecture specs, and hyperparameter configs enabled pixel-perfect reproduction. The gap appeared only at experimental execution (T08-T10) where the agent couldn't debug posterior quality issues (C2ST ~1.0 vs expected ~0.6). This suggests ARA's value is strongest for 'what to build' but current artifacts don't sufficiently help with 'how to debug when it doesn't work'."
    context: "ARA condition judge results analysis"
    potential_type: claim
    promoted: false

  - id: O41
    timestamp: "2026-03-17T03:00"
    provenance: ai-suggested
    content: "Mega-task cumulative token accounting (sum of all per-turn input tokens) is misleading for PDF-heavy baselines. The baseline's 123k-token PDF gets cached and re-sent every turn. With 59% cache hit rate, the effective new-information throughput per turn is similar, but the cumulative counter charges for cached reads. This creates an apples-to-oranges comparison when both conditions share the same cumulative budget. Solution: either per-subtask mode (fresh budget per task) or discount cached tokens in accounting."
    context: "Baseline condition post-mortem — token budget exhaustion at 68 turns"
    potential_type: heuristic
    promoted: false

  - id: O42
    timestamp: "2026-03-17T03:30"
    provenance: ai-executed
    content: "The run_agent.py _read_agent_outputs function only globbed *.py at the top level, missing all code in src/ subdirectory. This caused the first judge call to fail (empty input). Fixed by switching to rglob('*.py'). This is a robustness issue in the evaluation pipeline that would silently degrade judge quality for any agent that organizes code in subdirectories."
    context: "Judge pipeline debugging"
    potential_type: unknown
    promoted: false

  - id: O43
    timestamp: "2026-03-17T05:00"
    provenance: ai-suggested
    content: "ARA agent reached 0.60 at turn 12 (1 turn earlier than baseline's turn 13) and continued iterating to 0.607 (full-val), while baseline plateaued at 0.60 after recovering from regressions. The ARA advantage is visible not just in final score but in stability of improvement — ARA produced a monotone improvement trajectory (v1→v3) while baseline oscillated (0.60 → 0.0 → 0.0 → 0.0 → 0.60). This is consistent with C06: failure knowledge supports more directed search."
    context: "rust_codecontests seed 0 parallel run (2026-03-17)"
    potential_type: claim
    promoted: false

  - id: O44
    timestamp: "2026-03-17T05:00"
    provenance: ai-suggested
    content: "API reliability is a first-class threat to the extension experiment's validity. Both new runs ended in API crashes (baseline: connection timeout at turn 38; ARA: content filter + API timeouts blocking v4 scoring). The partial results are usable but the 'completed=false' flag and missing RESULT.md mean these are lower bounds, not final scores. Future runs should implement: (1) checkpoint-and-resume so a crash doesn't lose all progress, (2) per-problem fallback on content_filter errors, (3) exponential backoff with partial scoring on timeout."
    context: "rust_codecontests seed 0 parallel run (2026-03-17)"
    potential_type: heuristic
    promoted: false

  - id: O45
    timestamp: "2026-03-17T05:00"
    provenance: ai-suggested
    content: "The ARA agent's early turns show qualitatively different behavior from baseline: it opened 6 artifact files in the first 5 turns (PAPER.md, exploration_tree.yaml, heuristics.md, architecture.md, starter solution, utils) before writing any code. The baseline went directly to code. Despite this 5-turn overhead, ARA's first scored solution (v1 at turn 12) matched baseline's first solution (turn 13). This suggests the artifact reading is efficiently amortized — the agent builds a complete mental model before acting, trading turn latency for solution quality."
    context: "ARA agent behavior analysis, rust_codecontests seed 0 v2"
    potential_type: claim
    promoted: false

  - id: O46
    timestamp: "2026-03-17T10:00"
    provenance: ai-suggested
    content: "Claude Sonnet 4.6 as fallback for Azure gpt-5-mini content-filter rejections on competitive programming data is a natural design: Anthropic's content filters have different calibration from Azure's. Competitive programming problems that trigger Azure's sexual/medium heuristic (e.g., problems involving counting objects with anthropomorphic descriptions) are unlikely to trigger Anthropic's filters. The sanitize=True path (stripping problem description to I/O examples only) provides a second defense layer."
    context: "Designing Fix 4 — Claude fallback in local_score.py"
    potential_type: heuristic
    promoted: false

  - id: O48
    timestamp: "2026-03-19T13:30"
    provenance: ai-suggested
    content: "BAM is the first reproduction paper where baseline outperforms ARA (93.2% vs 88.2% weighted). BAM is a well-documented VI paper with clear Algorithm 1/2/3 pseudocode, explicit hyperparameter tables, and straightforward experimental setup. When the PDF itself is high quality, ARA's structural advantage diminishes. This suggests ARA's value is inversely correlated with PDF documentation quality — consistent with C09's finding that 45% median sufficiency creates the opportunity for ARA."
    context: "BAM reproduction pilot results"
    potential_type: claim
    promoted: false

  - id: O49
    timestamp: "2026-03-19T13:30"
    provenance: ai-suggested
    content: "ARA agent consumed 47% more tokens (12.6M vs 8.6M) and took 60% more time (6.9h vs 4.3h) on BAM. The artifact reading overhead (PAPER.md, logic/, src/, rubric/) adds ~2-4 turns of context loading at the start plus periodic re-reading. For well-documented papers, this overhead isn't compensated by downstream savings. On mechanistic-understanding (ARA won), ARA was faster (5.3h vs 8.1h) — suggesting the overhead is amortized only when it prevents dead-end exploration."
    context: "BAM reproduction token/time comparison"
    potential_type: claim
    promoted: false

  - id: O50
    timestamp: "2026-03-19T13:30"
    provenance: ai-suggested
    content: "ARA won T6 (non-Gaussian) 10/10 vs baseline 8.5/10. The ARA artifact had explicit sinh-arcsinh parameters (s=0.2, s=1.8, B=5, B=10) in configs/training.md. The baseline agent misinterpreted the PDF and ran extra parameterizations (s=0.0 with t=0.1/0.9/1.7) that were not in the paper's experimental design. This confirms ARA's value for precise hyperparameter specification — even well-written papers can have ambiguous parameter descriptions."
    context: "BAM per-subtask comparison — ARA advantage on T6"
    potential_type: claim
    promoted: false

  - id: O51
    timestamp: "2026-03-19T13:30"
    provenance: ai-suggested
    content: "ARA evidence/ directory was blocked for the ARA condition (by design, to prevent result leakage). Evidence tables had useful hyperparameter configs (e.g., deep_generative_learning_rates.md with BaM/ADVI LRs). This may have cost the ARA agent points on T9 (VAE: 10/15 vs baseline 12/15) and T8 (posteriorDB: 7/10 vs baseline 9.5/10). Consider: should evidence/ blocking be reconsidered for reproduction eval, or is preventing result leakage more important than fair hyperparameter access?"
    context: "BAM ARA evidence blocking analysis"
    potential_type: decision
    promoted: true
    promoted_to: "Confirmed by BAM v2 rerun: moving configs to src/configs/ recovered +5.4pp. Ingestor pipeline updated with setup-vs-results rule."

